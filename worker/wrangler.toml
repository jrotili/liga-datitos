name = "liga-datitos"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Static assets (sirve el HTML del frontend)
[assets]
directory = "./public"
binding = "ASSETS"

# KV namespace para caché de respuestas de API-Football
# Reemplazar el `id` con el que devuelva `wrangler kv namespace create CACHE`
[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Variables no-sensibles
[vars]
LEAGUE_ID = "128"           # Primera División Argentina - VERIFICAR
COPA_LIB_ID = "13"          # Copa Libertadores - VERIFICAR
COPA_SUD_ID = "11"          # Copa Sudamericana - VERIFICAR
SEASON = "2026"

# La API key se setea como secret (no va en el archivo):
#   wrangler secret put API_FOOTBALL_KEY
